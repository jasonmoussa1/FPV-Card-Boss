<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.01);
      overflow: hidden;
      user-select: none;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10, 12, 25, 0.94);
      border-bottom: 2px solid #f59e0b;
      padding: 14px 200px 14px 24px;
      pointer-events: none;
      z-index: 10;
    }

    #header h1 {
      color: #f59e0b;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    #step-num {
      color: #e2e8f0;
      font-size: 17px;
      font-weight: 900;
    }

    #step-label {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 3px;
      letter-spacing: 1px;
      max-width: 820px;
      line-height: 1.5;
    }

    #hint {
      color: #10b981;
      font-size: 11px;
      margin-top: 6px;
      letter-spacing: 2px;
      font-weight: 700;
      text-transform: uppercase;
    }

    #dots {
      position: fixed;
      top: 18px; right: 24px;
      display: flex;
      gap: 9px;
      pointer-events: none;
      z-index: 11;
    }

    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid #334155;
      background: #1e293b;
      transition: all 0.2s;
    }
    .dot.done   { background: #10b981; border-color: #10b981; }
    .dot.active { background: #f59e0b; border-color: #f59e0b; animation: pulse 0.9s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.6; transform: scale(1.25); }
    }

    #abort-hint {
      position: fixed;
      bottom: 28px; right: 28px;
      background: rgba(220, 38, 38, 0.85);
      color: white;
      padding: 12px 28px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 8px;
      z-index: 20;
      pointer-events: none;
    }

    .space-ripple {
      position: fixed;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.45);
      border: 2px solid #10b981;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ripple 0.5s ease-out forwards;
      z-index: 30;
    }

    @keyframes ripple {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1);   }
      to   { opacity: 0; transform: translate(-50%, -50%) scale(3.2); }
    }
  </style>
</head>
<body>

  <div id="header">
    <h1>🎯 GoPro Robot — Coordinate Calibration Mode</h1>
    <div id="step-num">Step 1 of 14</div>
    <div id="step-label"></div>
    <div id="hint">SPACE = capture position &nbsp;·&nbsp; ESC = abort</div>
  </div>

  <div id="dots">
    <div class="dot active" id="dot-0"></div>
    <div class="dot"        id="dot-1"></div>
    <div class="dot"        id="dot-2"></div>
    <div class="dot"        id="dot-3"></div>
    <div class="dot"        id="dot-4"></div>
    <div class="dot"        id="dot-5"></div>
    <div class="dot"        id="dot-6"></div>
    <div class="dot"        id="dot-7"></div>
    <div class="dot"        id="dot-8"></div>
    <div class="dot"        id="dot-9"></div>
    <div class="dot"        id="dot-10"></div>
    <div class="dot"        id="dot-11"></div>
    <div class="dot"        id="dot-12"></div>
    <div class="dot"        id="dot-13"></div>
  </div>

  <div id="abort-hint">ESC — ABORT CALIBRATION</div>

  <script>
    const { ipcRenderer } = require('electron');

    const steps = [
      { key: 'batchList',       label: 'Position your cursor over the Export Queue file list area (the dark area where filenames appear after adding files) — interact with GoPro freely — then press SPACE to capture' },
      { key: 'tenBit',          label: 'Position your cursor over the 10-Bit Color checkbox — interact with GoPro freely — then press SPACE to capture' },
      { key: 'hyperSmooth',     label: 'Position your cursor over the HyperSmooth mode toggle/button — interact with GoPro freely — then press SPACE to capture' },
      { key: 'unGain',          label: 'Position your cursor over the un-gain (link/chain) button between Smoothness and Cropping — interact with GoPro freely — then press SPACE to capture' },
      { key: 'horizonLock',     label: 'Horizon Lock — Hover over the Horizon Lock toggle/button in the GoPro batch exporter, then press SPACE (only clicked when Horizon Lock is turned on in the software)' },
      { key: 'smoothnessStart', label: 'Smoothness — START (value 50): Leave the smoothness slider at its default center position (value 50). Hover your cursor over the slider thumb and press SPACE.' },
      { key: 'smoothnessEnd',   label: 'Smoothness — END (value 15): Manually drag the smoothness slider left to value 15. Hover your cursor over the thumb at value 15 and press SPACE.' },
      { key: 'croppingStart',   label: 'Cropping Speed — START (value 50): Leave the cropping slider at its default center position (value 50). Hover your cursor over the slider thumb and press SPACE.' },
      { key: 'croppingEnd',     label: 'Cropping Speed — END (value 15): Manually drag the cropping slider left to value 15. Hover your cursor over the thumb at value 15 and press SPACE.' },
      { key: 'aspectRatioOpen', label: 'Position your cursor over the Aspect Ratio dropdown — interact with GoPro freely — then press SPACE to capture' },
      { key: 'aspectRatio8x7',  label: 'Open the Aspect Ratio dropdown in GoPro, hover over the 8:7 option — interact with GoPro freely — then press SPACE to capture' },
      { key: 'dropZone',        label: 'Position your cursor over the main drop area of GoPro Player (empty batch exporter area) — interact with GoPro freely — then press SPACE to capture' },
      { key: 'start',           label: 'Position your cursor over the Start Export button — interact with GoPro freely — then press SPACE to capture' },
      { key: 'removeQueue',     label: 'Remove Queue Button — Hover over the REMOVE button in GoPro Player batch export panel (next to the Add button), then press SPACE' },
    ];

    const coords = {};
    let current = 0;
    let mouseX = 0;
    let mouseY = 0;

    function updateUI() {
      document.getElementById('step-num').textContent = 'Step ' + (current + 1) + ' of ' + steps.length;
      document.getElementById('step-label').textContent = steps[current].label;
      for (let i = 0; i < steps.length; i++) {
        const d = document.getElementById('dot-' + i);
        if (!d) continue;
        d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
      }
    }

    // Track mouse position for ripple feedback (forwarded even in click-through mode)
    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    // Space = capture (sent from main via globalShortcut so it fires regardless of focus)
    ipcRenderer.on('space-captured', async function() {
      const pos = await ipcRenderer.invoke('get-cursor-pos');

      const ripple = document.createElement('div');
      ripple.className = 'space-ripple';
      ripple.style.left = mouseX + 'px';
      ripple.style.top  = mouseY + 'px';
      document.body.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 500);

      coords[steps[current].key] = { x: pos.x, y: pos.y };
      current++;

      if (current >= steps.length) {
        ipcRenderer.send('calibration-done', coords);
      } else {
        updateUI();
      }
    });

    // Escape = abort (sent from main via globalShortcut)
    ipcRenderer.on('escape-captured', function() {
      ipcRenderer.send('calibration-done', null);
    });

    updateUI();
  </script>
</body>
</html>
